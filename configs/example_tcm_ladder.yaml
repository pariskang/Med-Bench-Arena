# TCM-Ladder (Xie et al. 2025, arXiv 2505.24063) — open on HuggingFace
# (timzzyus/TCM-Ladder, CC-BY-4.0). Two released sets wired here:
#   - multiChoice: 12,778 bilingual text MCQ (single + multi), no images.
#   - visual:       8,802 tongue/herb images (raw JPEG bytes), label = herb|tongue.
# The HF auto-config is broken, so load each parquet via data_files.
#
#   python -m medeval run configs/example_tcm_ladder.yaml --limit 20
#
# A vision model is required for the image set; the text set needs only an LLM.
run:
  output_dir: ./results/tcm_ladder
  concurrency: 8
  cache: true

eval:
  # 2048, not 256: the MCQ default is zero-shot CoT ("think step by step, then
  # Answer: X"); with multi-answer items ("Answer: BC") a 256-token cap truncates
  # the trace before the Answer: line and the item scores 0. TCM-Ladder is an
  # official-tier set — truncation-driven zeros would corrupt the leaderboard.
  gen: {temperature: 0.0, max_tokens: 2048}

models:
  - {id: gpt-4o, type: litellm, model: openai/gpt-4o, api_key_env: OPENAI_API_KEY}  # vision-capable
  # - {id: mock-model, type: mock, behavior: auto}     # offline dry-run

datasets:
  # --- text MCQ (A-E columns, multi-answer) ---
  - id: tcm_ladder_mc
    adapter: hf_mcq
    format: parquet
    # pinned to an immutable commit (resolve/<sha>) for reproducibility
    data_files: https://huggingface.co/datasets/timzzyus/TCM-Ladder/resolve/4e875657f9ff650df432427221bb4f957e30b6f0/multiChoice.parquet
    split: train
    field_map: {question: question, options: [A, B, C, D, E], answer: answer}
    answer_format: multi          # "C" and "ABCDE" both handled; blank trailing E dropped
    metrics: [mcq_accuracy]

  # --- multimodal: the FAITHFUL 4-option visual MCQ (舌象/中药) ---
  # Each visual.parquet image is a PRE-RENDERED 4-choice question — the question
  # text, the candidate options and the A/B/C/D labels are all baked into the image
  # (herb = a 2x2 grid of 4 photos "which is X?"; tongue = 1 photo + 4 text options
  # "which constitution?"). So the model just reads the image and outputs the letter;
  # no question/options are injected. (category herb/tongue + lang are report slices.)
  # FAITHFUL reproduction of the original visual-QA task (verified by inspecting the
  # images): each row IS the rendered 4-option question — herb = a 2x2 grid of 4 photos
  # ("以下哪种草药为…？"), tongue = 1 photo + 4 text options ("…属于哪种体质？  A. … D. …").
  # The model reads the image and outputs the letter; gold `answer` is A/B/C/D. This is
  # NOT a herb/tongue binary classifier (category/lang are only report slices).
  - id: tcm_ladder_visual
    adapter: hf_mcq
    format: parquet
    # pinned to an immutable commit (resolve/<sha>) for reproducibility
    data_files: https://huggingface.co/datasets/timzzyus/TCM-Ladder/resolve/4e875657f9ff650df432427221bb4f957e30b6f0/visual.parquet
    split: train
    question_text: "The image is a multiple-choice question with options labeled A, B, C, D. Answer with ONLY the letter of the correct option. 图中为四选一选择题，请只回答正确选项的字母。"
    prompt_template: "{question}"   # options are in the image -> don't render a text block
    inject_options: ["A", "B", "C", "D"]
    field_map: {answer: answer, image: image}
    answer_format: letter           # gold 'answer' is the letter A/B/C/D
    split_type: official            # faithful original visual MCQ (not a sanity-check)
    metrics: [mcq_accuracy]
    # NOTE: visual.parquet is ~730 MB (images embedded). Use --limit, or stream.
