# Traditional Chinese Medicine (TCM) evaluation — the protocol's reference run.
# Knowledge (CMB / TCMBench MCQ) + syndrome differentiation 辨证 (TCMEval-SDT) +
# prescription 方剂 (MTCMB) + safety 安全 (MTCMB-SE / CSEDB), all judged by an
# LLM-as-judge. Mirrors the MTCMB 5-category structure.
#
#   python -m medeval run configs/example_tcm.yaml --limit 3
#
# Defaults to the offline mock model + mock judge so it runs with no keys (still
# downloads the real datasets). For a real run, point `judge_model` at DeepSeek-R1
# and the model-under-test at your ZhongJing-TCM checkpoint (see commented lines).
run:
  output_dir: ./results/tcm
  concurrency: 12
  cache: true

eval:
  gen: {temperature: 0.0, max_tokens: 1024}
  judge_model: mock-judge        # real: deepseek-r1 (below)

models:
  - {id: mock-model, type: mock, behavior: auto}
  - {id: mock-judge, type: mock, behavior: auto, judge_only: true}
  # Real model-under-test (local ZhongJing-TCM via vLLM):
  # - {id: zhongjing-tcm, type: hf, model: /models/zhongjing-tcm, dtype: bfloat16,
  #    tensor_parallel: 2, max_model_len: 8192, lora: /adapters/sbdt}
  # Recommended judge (CSEDB-validated price/throughput):
  # - {id: deepseek-r1, type: litellm, model: deepseek/deepseek-reasoner,
  #    api_key_env: DEEPSEEK_API_KEY, judge_only: true}

datasets:
  # --- knowledge (MCQ) ---
  - id: cmb_tcm               # CMB-val (280) — a quick check, NOT the official test
    adapter: hf_mcq
    path: FreedomIntelligence/CMB
    data_files: https://huggingface.co/datasets/FreedomIntelligence/CMB/resolve/main/CMB-Exam/CMB-val/CMB-val-merge.json
    field_map: {question: question, options: option, answer: answer}
    answer_format: multi
    split_type: validation    # val split — use cmb_test (catalog_mcq.yaml) for official
    metrics: [mcq_accuracy]

  # TCMBench (ywjawmw/TCMBench, arXiv:2406.01126) — the repo publishes a per-type
  # *demo* set under data_demo/ (one worked example per question type across all
  # three difficulty levels; A1/A2 flat + A3/B1 shared-stem). We wire ALL 14 demo
  # files (first/second/third level) -> 20 MCQ items. The full 5,473-question bank
  # is gated (request from the authors); drop its path(s) in here to score it.
  - id: tcmbench
    adapter: tcmbench
    source_url:
      - https://raw.githubusercontent.com/ywjawmw/TCMBench/main/data_demo/first_level/CVR.json
      - https://raw.githubusercontent.com/ywjawmw/TCMBench/main/data_demo/first_level/FKU.json
      - https://raw.githubusercontent.com/ywjawmw/TCMBench/main/data_demo/first_level/KHC.json
      - https://raw.githubusercontent.com/ywjawmw/TCMBench/main/data_demo/second_level/CBF.json
      - https://raw.githubusercontent.com/ywjawmw/TCMBench/main/data_demo/second_level/DDST.json
      - https://raw.githubusercontent.com/ywjawmw/TCMBench/main/data_demo/second_level/PF.json
      - https://raw.githubusercontent.com/ywjawmw/TCMBench/main/data_demo/second_level/SCF.json
      - https://raw.githubusercontent.com/ywjawmw/TCMBench/main/data_demo/second_level/SDDT.json
      - https://raw.githubusercontent.com/ywjawmw/TCMBench/main/data_demo/second_level/SDT.json
      - https://raw.githubusercontent.com/ywjawmw/TCMBench/main/data_demo/third_level/DDST_hard.json
      - https://raw.githubusercontent.com/ywjawmw/TCMBench/main/data_demo/third_level/SDDT_hard.json
      - https://raw.githubusercontent.com/ywjawmw/TCMBench/main/data_demo/third_level/SDT_reverse.json
      - https://raw.githubusercontent.com/ywjawmw/TCMBench/main/data_demo/third_level/SDT_shuffle.json
      - https://raw.githubusercontent.com/ywjawmw/TCMBench/main/data_demo/third_level/herb_predict.json
    split_type: demo             # 14 demo items only — NOT the full (gated) TCMBench
    metrics: [mcq_accuracy]

  # --- syndrome differentiation 辨证 (judged on the 症状–病机–证型 chain) ---
  - id: tcmeval_sdt
    adapter: local_json
    task: sdt                    # -> default 证型链 rubric (with 同病异治 partial credit)
    source_url: https://raw.githubusercontent.com/zhuyan166/TCMEval/main/evaluation/TCMEval-SDT/data/Train_TCM_Data_v1.json
    field_map: {prompt: "Clinical Data", reference: "Syndrome Differentiation",
                label: "TCM Syndrome", pathogenesis: "TCM Pathogenesis"}
    split_type: validation       # only the Train split has gold; test/val are blank
    metrics: [llm_judge, syndrome_chain, bleu, rouge]   # 证型链结构分 + 文本重合 + rubric

  # --- prescription 方剂生成 ---
  - id: mtcmb_frd
    adapter: local_json
    task: prescription           # -> default 方剂 rubric (君臣佐使 + 配伍禁忌)
    source_url: https://raw.githubusercontent.com/Wayyuanyuan/MTCMB/main/data/10.TCM_FRD.jsonl
    field_map: {prompt: question, reference: answer}
    metrics: [llm_judge, prescription_match]   # rubric judge + 君臣佐使 herb-set F1

  # --- safety 安全 ---
  - id: mtcmb_safety
    adapter: local_json
    task: safety
    source_url: https://raw.githubusercontent.com/Wayyuanyuan/MTCMB/main/data/11.TCM_SE_A.jsonl
    field_map: {prompt: question, reference: answer}
    metrics: [llm_judge]

  - id: csedb_sample           # only a 2-record public sample; full bank is gated
    adapter: local_json        # (email it@medlinker.com). Split safety vs 有效 on 门类.
    task: safety
    source_url: https://raw.githubusercontent.com/Medlinker-MG/CSEDB/main/generate/test_sampled.json
    explode: "设计的考题内容.最具代表性的测试case"
    field_map: {prompt: "输入 case", rubric: "规则判断列表", label: "考点.门类"}
    split_type: sample           # 2-record public sample; full 2,069-item bank is gated
    metrics: [llm_judge]
