# Catalog: medical multiple-choice benchmarks (English + Chinese + TCM).
# Every entry below was verified against the live source on 2026-06-22 — real
# repo ids, splits, column names and answer encodings. Run a quick smoke with:
#
#   python -m medeval run configs/catalog_mcq.yaml --limit 5
#
# The default model is the offline `mock` provider (so it runs with no API key —
# it still downloads the *real* datasets). Swap in a real backend by editing
# models[] (see configs/example_api_backends.yaml for hf / poe / litellm).
run:
  output_dir: ./results/mcq
  concurrency: 16
  cache: true

eval:
  gen: {temperature: 0.0, max_tokens: 512}

models:
  - {id: mock-model, type: mock, behavior: auto}
  # - {id: deepseek, type: litellm, model: deepseek/deepseek-chat, api_key_env: DEEPSEEK_API_KEY}

datasets:
  # ---- English ----------------------------------------------------------
  - id: medqa_usmle           # USMLE, 1273 test Qs, options dict, letter answer
    adapter: hf_mcq
    path: GBaker/MedQA-USMLE-4-options
    split: test
    field_map: {question: question, options: options, answer: answer_idx}
    answer_format: letter
    metrics: [mcq_accuracy]

  - id: medmcqa               # 4 separate opt cols, int cop. USE validation:
    adapter: hf_mcq           # the test split has cop=-1 (labels withheld).
    path: openlifescienceai/medmcqa
    split: validation
    field_map: {question: question, options: [opa, opb, opc, opd], answer: cop}
    answer_format: index
    metrics: [mcq_accuracy]

  - id: pubmedqa              # yes/no/maybe; no options column -> inject them
    adapter: hf_mcq
    path: qiaojin/PubMedQA
    name: pqa_labeled
    split: train              # only split that exists per config
    field_map: {question: question, options: null, answer: final_decision, context: context}
    answer_format: text
    inject_options: [yes, no, maybe]
    metrics: [mcq_accuracy]

  - id: mmlu_medical          # 6 medical subjects, list choices, int answer
    adapter: hf_mcq
    path: cais/mmlu
    name: [anatomy, clinical_knowledge, college_medicine, college_biology, medical_genetics, professional_medicine]
    split: test
    field_map: {question: question, options: choices, answer: answer}
    answer_format: index
    metrics: [mcq_accuracy]

  # ---- Chinese ----------------------------------------------------------
  - id: cmb                   # FreedomIntelligence/CMB. The HF loader script is
    adapter: hf_mcq           # broken on datasets>=5, so load the raw JSON file.
    path: FreedomIntelligence/CMB
    data_files: https://huggingface.co/datasets/FreedomIntelligence/CMB/resolve/main/CMB-Exam/CMB-val/CMB-val-merge.json
    field_map: {question: question, options: option, answer: answer}
    answer_format: multi      # dict options A-F (F often null); answer may be "BCDE"
    metrics: [mcq_accuracy]

  - id: cmexam                # williamliujl/CMExam, CSV; options packed inline
    adapter: hf_mcq
    format: csv
    data_files: https://raw.githubusercontent.com/williamliujl/CMExam/main/data/test_with_annotations.csv
    options_inline: true      # "A text\nB text\n..." in one column
    field_map: {question: Question, options: Options, answer: Answer}
    answer_format: multi      # multi-correct as concatenated letters ("ABCE")
    metrics: [mcq_accuracy]

  # ---- TCM --------------------------------------------------------------
  - id: tcmbench_fku          # ywjawmw/TCMBench demo subset (options embedded)
    adapter: tcmbench
    source_url: https://raw.githubusercontent.com/ywjawmw/TCMBench/main/data_demo/first_level/FKU.json
    answer_format: multi
    metrics: [mcq_accuracy]

  # ---- Not config-only (left here as documentation) ---------------------
  # MLEC-QA: data is a Google-Drive ZIP behind a Google sign-in (not in repo, no
  #   HF mirror). Download + unzip, then point a local hf_mcq at it:
  #   - id: mlec_qa_ph
  #     adapter: hf_mcq
  #     data_files: ./PublicHealth_test.json   # local after manual download
  #     field_map: {question: qtext, options: options, answer: answer}
  #     answer_format: letter
  # TCM-3CEval: released only via the MedBench submission platform with held-out
  #   answer keys (medbench.opencompass.org.cn) — not downloadable.
