# Catalog: medical multiple-choice benchmarks (English + Chinese + TCM).
# Every entry below was verified against the live source on 2026-06-22 — real
# repo ids, splits, column names and answer encodings. Run a quick smoke with:
#
#   python -m medeval run configs/catalog_mcq.yaml --limit 5
#
# The default model is the offline `mock` provider (so it runs with no API key —
# it still downloads the *real* datasets). Swap in a real backend by editing
# models[] (see configs/example_api_backends.yaml for hf / poe / litellm).
run:
  output_dir: ./results/mcq
  concurrency: 16
  cache: true

eval:
  gen: {temperature: 0.0, max_tokens: 512}

models:
  - {id: mock-model, type: mock, behavior: auto}
  # - {id: deepseek, type: litellm, model: deepseek/deepseek-chat, api_key_env: DEEPSEEK_API_KEY}

datasets:
  # ---- English ----------------------------------------------------------
  # NOTE: every dataset below is PINNED to an immutable commit (revision / URL hash)
  # so the eval set can never silently change underneath you. `revision:` is passed
  # to load_dataset(); data_files/answer URLs embed the commit (resolve/<sha> or
  # raw.githubusercontent/.../<sha>/). Profile after pinning with:
  #     python -m medeval preflight configs/catalog_mcq.yaml
  - id: medqa_usmle           # USMLE, 1273 test Qs, options dict, letter answer
    adapter: hf_mcq
    path: GBaker/MedQA-USMLE-4-options
    revision: 0fb93dd23a7339b6dcd27e241cb9b5eca62d4d18
    split: test
    field_map: {question: question, options: options, answer: answer_idx}
    answer_format: letter
    metrics: [mcq_accuracy]

  - id: medmcqa               # 4 separate opt cols, int cop. USE validation:
    adapter: hf_mcq           # the test split has cop=-1 (labels withheld).
    path: openlifescienceai/medmcqa
    revision: 91c6572c454088bf71b679ad90aa8dffcd0d5868
    split: validation
    field_map: {question: question, options: [opa, opb, opc, opd], answer: cop}
    answer_format: index
    metrics: [mcq_accuracy]

  - id: pubmedqa              # yes/no/maybe; no options column -> inject them
    adapter: hf_mcq
    path: qiaojin/PubMedQA
    revision: 9001f2853fb87cab8d220904e0de81ac6973b318
    name: pqa_labeled
    split: train              # only split that exists per config
    field_map: {question: question, options: null, answer: final_decision, context: context}
    answer_format: text
    inject_options: ["yes", "no", "maybe"]   # MUST quote — bare yes/no are YAML booleans!
    metrics: [mcq_accuracy]

  - id: mmlu_medical          # 6 medical subjects, list choices, int answer
    adapter: hf_mcq
    path: cais/mmlu
    revision: c30699e8356da336a370243923dbaf21066bb9fe
    name: [anatomy, clinical_knowledge, college_medicine, college_biology, medical_genetics, professional_medicine]
    split: test
    field_map: {question: question, options: choices, answer: answer}
    answer_format: index
    metrics: [mcq_accuracy]

  # ---- Chinese ----------------------------------------------------------
  - id: cmb_test              # FULL official CMB-Exam test (11,200) — gold answers are
    adapter: hf_mcq           # public on GitHub, joined to the HF questions by `id`.
    path: FreedomIntelligence/CMB
    data_files: https://huggingface.co/datasets/FreedomIntelligence/CMB/resolve/935fbc09edf1303d89872b21265ff597f426ac0d/CMB-Exam/CMB-test/CMB-test-choice-question-merge.json
    field_map: {question: question, options: option, answer: answer}
    answer_format: multi      # dict options A-F (F often null); answer may be "BCDE"
    answer_join: {data_files: https://raw.githubusercontent.com/FreedomIntelligence/CMB/6c8ece46097dae736c6805dd3b831e1a38c08971/data/CMB-test-choice-answer.json, key: id, value: answer}
    metrics: [mcq_accuracy]

  # CMB-Exam train (269,359, answers inline) — the large scorable set:
  # - {id: cmb_train, adapter: hf_mcq, path: FreedomIntelligence/CMB,
  #    data_files: https://huggingface.co/datasets/FreedomIntelligence/CMB/resolve/main/CMB-Exam/CMB-train/CMB-train-merge.json,
  #    field_map: {question: question, options: option, answer: answer}, answer_format: multi}
  # CMB-Exam val (280, fully answered) — the quick check:
  # - {id: cmb_val, adapter: hf_mcq, path: FreedomIntelligence/CMB,
  #    data_files: https://huggingface.co/datasets/FreedomIntelligence/CMB/resolve/main/CMB-Exam/CMB-val/CMB-val-merge.json,
  #    field_map: {question: question, options: option, answer: answer}, answer_format: multi}
  # CMB-Clin (74 clinical cases, free-text gold) -> local_json + llm_judge:
  # - {id: cmb_clin, adapter: local_json, task: open_qa,
  #    source_url: https://huggingface.co/datasets/FreedomIntelligence/CMB/resolve/main/CMB-Clin/CMB-Clin-qa.json,
  #    explode: QA_pairs, field_map: {prompt: question, reference: answer}, metrics: [llm_judge]}

  - id: cmexam                # williamliujl/CMExam, CSV; options packed inline
    adapter: hf_mcq
    format: csv
    data_files: https://raw.githubusercontent.com/williamliujl/CMExam/fadb22c89beb1b7115dc36460ba792eb96b7b972/data/test_with_annotations.csv
    options_inline: true      # "A text\nB text\n..." in one column
    field_map: {question: Question, options: Options, answer: Answer}
    answer_format: multi      # multi-correct as concatenated letters ("ABCE")
    metrics: [mcq_accuracy]

  # ---- TCM --------------------------------------------------------------
  - id: tcmbench_demo         # ywjawmw/TCMBench — ALL 14 public demo files (options
    adapter: tcmbench         # embedded in the stem). -> 20 MCQ items spanning A1/A3/B1
    source_url:               # types. Full 5,473-Q bank is gated (request from authors).
      - https://raw.githubusercontent.com/ywjawmw/TCMBench/main/data_demo/first_level/CVR.json
      - https://raw.githubusercontent.com/ywjawmw/TCMBench/main/data_demo/first_level/FKU.json
      - https://raw.githubusercontent.com/ywjawmw/TCMBench/main/data_demo/first_level/KHC.json
      - https://raw.githubusercontent.com/ywjawmw/TCMBench/main/data_demo/second_level/CBF.json
      - https://raw.githubusercontent.com/ywjawmw/TCMBench/main/data_demo/second_level/DDST.json
      - https://raw.githubusercontent.com/ywjawmw/TCMBench/main/data_demo/second_level/PF.json
      - https://raw.githubusercontent.com/ywjawmw/TCMBench/main/data_demo/second_level/SCF.json
      - https://raw.githubusercontent.com/ywjawmw/TCMBench/main/data_demo/second_level/SDDT.json
      - https://raw.githubusercontent.com/ywjawmw/TCMBench/main/data_demo/second_level/SDT.json
      - https://raw.githubusercontent.com/ywjawmw/TCMBench/main/data_demo/third_level/DDST_hard.json
      - https://raw.githubusercontent.com/ywjawmw/TCMBench/main/data_demo/third_level/SDDT_hard.json
      - https://raw.githubusercontent.com/ywjawmw/TCMBench/main/data_demo/third_level/SDT_reverse.json
      - https://raw.githubusercontent.com/ywjawmw/TCMBench/main/data_demo/third_level/SDT_shuffle.json
      - https://raw.githubusercontent.com/ywjawmw/TCMBench/main/data_demo/third_level/herb_predict.json
    answer_format: multi
    metrics: [mcq_accuracy]

  # ---- Not config-only (left here as documentation) ---------------------
  # MLEC-QA: data is a Google-Drive ZIP behind a Google sign-in (not in repo, no
  #   HF mirror). Download + unzip, then point a local hf_mcq at it:
  #   - id: mlec_qa_ph
  #     adapter: hf_mcq
  #     data_files: ./PublicHealth_test.json   # local after manual download
  #     field_map: {question: qtext, options: options, answer: answer}
  #     answer_format: letter
  # TCM-3CEval: released only via the MedBench submission platform with held-out
  #   answer keys (medbench.opencompass.org.cn) — not downloadable.
