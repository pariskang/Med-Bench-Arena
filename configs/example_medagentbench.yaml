# MedAgentBench — FHIR virtual-EHR agent benchmark (Stanford, NEJM AI 2025).
# The model acts via FHIR REST calls (GET / POST / FINISH) against a real EHR
# server; scored with pass@1 (query tasks exact-match, action tasks verify the
# write actually landed for the target patient).
#
# REQUIRES a running FHIR server. Start the official HAPI-FHIR image first:
#
#   docker pull jyxsu6/medagentbench:latest
#   docker run -p 8080:8080 jyxsu6/medagentbench:latest     # serves :8080/fhir
#   # verify:  curl http://localhost:8080/fhir/metadata
#
# Then (with a real doctor model + your key):
#   python -m medeval run configs/example_medagentbench.yaml --limit 10
#
# Grading: the built-in grader validates what it CAN check offline (task1 gold,
# action-task POST payloads, the no-write rule for queries). Tasks it cannot
# verify without the official gold (query values of tasks 2/4/6/7, conditional
# no-ops of tasks 5/9/10) are flagged `ungradable` and EXCLUDED from pass^k
# (reported as `ungradable` in the aggregate) — never counted as failures.
# For the OFFICIAL per-task rules, obtain the gated refsol.py (project Box link)
# and set `refsol_path` below — it is called exactly as the upstream harness
# does: getattr(refsol, task_id)(task, answer, fhir_base).
#
# ISOLATION RISK: every episode (each of the 300 tasks, and every k>1 rollout
# of the same task) shares this ONE live FHIR server with no reset between them
# — a POST from one episode can leak into a later episode's GETs. Without
# `episode_reset` below, `run.concurrency` is forced to 1 for this dataset and
# split_type is capped at `reimplementation`/`approximated` (never `official`,
# even with refsol_path) — see the ISOLATION RISK note on MedAgentBenchAdapter.
# If your FHIR image exposes a reset/reseed endpoint, wire it:
#   episode_reset: {url: http://localhost:8080/fhir/$reset, method: POST}
run:
  output_dir: ./results/medagentbench
  concurrency: 4     # only takes effect if episode_reset (or allow_concurrent_episodes) is set below
  cache: true

eval:
  gen: {temperature: 0.0, max_tokens: 1024}

models:
  # A capable tool-using model is required; the offline mock cannot drive FHIR.
  - {id: gpt-4o, type: litellm, model: openai/gpt-4o, api_key_env: OPENAI_API_KEY}
  # - {id: claude, type: poe, bot_name: Claude-Opus-4.7, api_key_env: POE_API_KEY}

datasets:
  - id: medagentbench
    adapter: medagentbench
    fhir_base: http://localhost:8080/fhir
    max_turns: 8                 # paper: 8 rounds (repo config default: 5)
    metrics: [pass_k]
    k: 1                         # the benchmark uses pass@1 by design
    # refsol_path: /path/to/refsol.py   # optional: official gated grader
    # episode_reset: {url: http://localhost:8080/fhir/$reset, method: POST}  # if supported
    # allow_concurrent_episodes: true   # opt into concurrency without episode_reset, at your own risk
